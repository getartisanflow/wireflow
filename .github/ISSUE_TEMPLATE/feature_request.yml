name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you trying to accomplish?
      placeholder: "I'm trying to build X with Livewire, but WireFlow doesn't let me..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Blade component props, trait methods, events, etc.
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Which layer does this affect?
      multiple: true
      options:
        - Blade components (<x-flow>, <x-flow-handle>, etc.)
        - WithWireFlow trait
        - Server-side events (@connect, @node-click, etc.)
        - Sync modes (static, entangled, collab)
        - Install command / configuration
        - Documentation
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: Blade and/or PHP code showing how you'd expect to use this feature.
      render: blade

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or alternative approaches.

  - type: dropdown
    id: breaking
    attributes:
      label: Would this be a breaking change?
      options:
        - "No — additive only"
        - "Maybe — could affect existing behavior"
        - "Yes — would require API changes"
      default: 0
    validations:
      required: true
